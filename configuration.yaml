# Orchestrator configuration — generated by scaffold.
# See docs/ARCHITECTURE.yaml for field descriptions.

project:
    module_path: github.com/petar-djukic/press
    binary_name: press
    binary_dir: bin
    main_package: ""
    go_source_dirs: []
    version_file: ""
    magefiles_dir: magefiles
    context_sources: ""
    context_include: ""
    context_exclude: ""
    release: ""
    releases: []
    target_repo: ""
    seed_files: {}
generation:
    prefix: generation-
    name: ""
    cycles: 0
    branch: ""
    cleanup_dirs: []
    preserve_sources: false
cobbler:
    dir: .cobbler/
    issues_repo: ""
    max_stitch_issues: 0
    max_stitch_issues_per_cycle: 10
    max_measure_issues: 1
    measure_tasks_per_call: 0
    user_prompt: ""
    measure_prompt: docs/prompts/measure.yaml
    stitch_prompt: docs/prompts/stitch.yaml
    planning_constitution: docs/constitutions/planning.yaml
    execution_constitution: docs/constitutions/execution.yaml
    design_constitution: docs/constitutions/design.yaml
    go_style_constitution: docs/constitutions/go-style.yaml
    estimated_lines_min: 250
    estimated_lines_max: 350
    golden_example: ""
    max_context_bytes: 0
    enforce_measure_validation: false
    max_measure_retries: 0
    min_measure_issues: 0
    max_requirements_per_task: 0
    max_weight_per_task: 0
    max_task_failures: 3
    max_consecutive_zero_loc_cycles: 3
    rate_limit_backoff_seconds: 0
    history_dir: history
    doc_tag_prefix: v0.
    base_branch: main
    idle_timeout_seconds: 60
    measure_idle_timeout_seconds: 1800
    measure_exclude_source: false
    measure_source_patterns: ""
    measure_roadmap_source: false
    measure_exclude_tests: true
    stitch_exclude_tests: null
    measure_source_mode: ""
    measure_summarize_command: ""
    mode: ""
claude:
    args:
        - --dangerously-skip-permissions
        - -p
        - --verbose
        - --output-format
        - stream-json
    silence_agent: true
    max_time_sec: 300
    temperature: 0

# --- Press agent runtime configuration ---

agent:
    # System prompt: path to YAML file with prompt template, or inline string.
    # Set by cobbler orchestrator per generation. See docs/prompts/system-prompt-default.yaml.
    system_prompt_path: docs/prompts/system-prompt-default.yaml

    # LLM provider. See docs/interfaces/if009-provider-config.yaml.
    provider: ollama
    ollama:
        endpoint: "http://localhost:11434"
        model: "qwen2.5-coder:32b"
        context_window: 128000
    bedrock:
        region: "us-east-1"
        model_id: "anthropic.claude-sonnet-4-20250514"
        credentials_file: ".secrets/aws-credentials"
        profile: ""
        context_window: 200000

    # Target programming language. Set by orchestrator based on workspace detection.
    # Examples: go, typescript, python, rust.
    language: go

    # Mage targets allowed for build_target tool. The orchestrator configures
    # mage with language-appropriate targets via magefile tags.
    allowed_mage_targets:
        - "test:unit"
        - "test:integration"
        - "test:all"
        - "lint"
        - "build"

    # Logging. Agent logs to standard Go log/slog.
    # Cobbler reads logs from shared infrastructure.
    log_level: "info"
