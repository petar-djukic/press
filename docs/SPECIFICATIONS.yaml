id: press
title: Press Specifications

overview: |
  We build an agent runtime where workflows are tracked as trails, tool execution attempts
  are tracked as crumbs, and tool availability is scoped by stashes. The runtime is designed
  as the stitch execution unit inside an external orchestrator (cobbler-scaffold). It is
  language-agnostic: the orchestrator selects the target programming language and provides
  language-specific rules, conventions, and build commands at invocation time. The runtime
  itself is implemented in Go and links with the crumbs library.

  This document indexes all PRDs, use cases, and test suites in the project and shows how they
  relate. For goals and boundaries, see VISION.yaml. For components and interfaces, see
  ARCHITECTURE.yaml.

