taxonomy:
  - id: C1
    name: system_behavior
    description: Role, boundaries, coding principles, and high-level operating constraints.
  - id: C2
    name: context_injection
    description: Runtime and task context sections injected per turn.
  - id: C3
    name: tool_policy
    description: Tool usage preferences, tool-specific constraints, and invocation policy.
  - id: C4
    name: response_format
    description: Required output formats for parser compatibility and action routing.
  - id: C5
    name: editing_protocol
    description: File edit formats and safety rules for deterministic code mutation.
  - id: C6
    name: planning_and_decomposition
    description: Planner prompts, step construction, and clarifying-question fallback.
  - id: C7
    name: error_recovery
    description: Retry and correction behavior after malformed outputs or failed operations.
  - id: C8
    name: verification_and_reflection
    description: Validate outputs against checks and specs before completion.
  - id: C9
    name: memory_and_summary
    description: Compaction, summarization, and memory continuity prompts.
  - id: C10
    name: safety_permissions
    description: Permission boundaries, risky action checks, and policy reminders.

