id: prompt-extraction-and-taxonomy
title: Open Source Prompt Extraction and Categorization
status: draft

scope: |
  Extract and categorize prompt patterns from dropped open-source coding agents,
  then derive practical prompt templates for stitch runtime.

notes:
  - Excerpts are intentionally short and normalized.
  - Full source prompts remain in referenced files.
  - Orchestrator owns multi-agent and git lifecycle; stitch prompts avoid those responsibilities.

